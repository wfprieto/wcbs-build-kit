name: WCBS Verification Bridge

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/wcbs-verification-bridge.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-and-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout clean main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Record repository state
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verification-evidence/logs
          {
            echo 'HEAD:'
            git rev-parse HEAD
            echo
            echo 'STATUS:'
            git status --short
            echo
            echo 'LOG:'
            git log --oneline --decorate -15
            echo
            echo 'TRACKED FILES:'
            git ls-files
          } | tee verification-evidence/logs/repository-state.txt
          test ! -e .wcbs-bootstrap
          test ! -e .github/workflows/wcbs-recover-main.yml
          test -s 20_PASS_WHOLE_KIT_AUDIT.md

      - name: Clean checkout gate
        shell: bash
        run: |
          set -euo pipefail
          git clean -xfd
          npm run check 2>&1 | tee verification-evidence/logs/npm-run-check-clean.txt

      - name: Critical suites
        shell: bash
        run: |
          set -euo pipefail
          node --test scripts/tests/controller-contract.test.mjs 2>&1 | tee verification-evidence/logs/controller-contract.txt
          node --test scripts/tests/adapter-contract.test.mjs 2>&1 | tee verification-evidence/logs/adapter-contract.txt
          node --test scripts/tests/schema-enforcement.test.mjs 2>&1 | tee verification-evidence/logs/schema-enforcement.txt
          node --test scripts/tests/artifact-bundle.test.mjs 2>&1 | tee verification-evidence/logs/artifact-bundle.txt
          node --test scripts/tests/wcbs-doctor.test.mjs 2>&1 | tee verification-evidence/logs/wcbs-doctor.txt
          python3 -m unittest discover -s skills/subagent-driven-development/tests -v 2>&1 | tee verification-evidence/logs/python-tests.txt

      - name: F-012 adversarial checks
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/f012-adversarial.mjs <<'EOF'
          import assert from 'node:assert/strict';
          import { validateAgainstSchema } from './scripts/lib/json-schema.mjs';

          function rejectsSchema(schema, document, label) {
            assert.throws(() => validateAgainstSchema(schema, document), undefined, label);
          }
          function rejectsDocument(schema, document, label) {
            const errors = validateAgainstSchema(schema, document);
            assert.ok(errors.length > 0, `${label}: expected validation errors`);
          }
          function accepts(schema, document, label) {
            assert.deepEqual(validateAgainstSchema(schema, document), [], label);
          }

          rejectsSchema({type:'object',properties:{x:{type:'number',exclusiveMinimum:5}}}, {}, 'unsupported absent property keyword');
          rejectsSchema({type:'object',$defs:{unused:{type:'string',minContains:1}}}, {}, 'unsupported unused $defs keyword');
          rejectsDocument({$defs:{n:{type:'number'}},$ref:'#/$defs/n',minimum:5}, 1, '$ref sibling minimum');

          const dt={type:'string',format:'date-time'};
          for (const value of ['2026-07-11T12:30:00+99:00','2026-07-11T12:30:00+02:99','2026-02-31T00:00:00Z']) {
            rejectsDocument(dt,value,`invalid date-time ${value}`);
          }
          for (const value of ['2026-07-11T12:30:00Z','2024-02-29T23:59:59+23:59','2026-01-01T00:00:00-23:59']) {
            accepts(dt,value,`valid date-time ${value}`);
          }
          console.log('F-012 adversarial checks: PASS (9 cases)');
          EOF
          node /tmp/f012-adversarial.mjs 2>&1 | tee verification-evidence/logs/f012-adversarial.txt

      - name: F-011 hermetic checks
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .wcbs
          test ! -e .wcbs
          node --test scripts/tests/artifact-bundle.test.mjs 2>&1 | tee verification-evidence/logs/f011-artifact-no-live-bundle.txt
          npm run check 2>&1 | tee verification-evidence/logs/f011-full-check-no-live-bundle.txt
          test ! -e .wcbs
          echo 'F-011 hermetic checks: PASS' | tee verification-evidence/logs/f011-summary.txt

      - name: Package exact repository and evidence
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git status --short | tee verification-evidence/logs/final-status.txt
          git bundle create verification-evidence/wcbs-build-kit.bundle --all
          git archive --format=tar.gz --output=verification-evidence/wcbs-build-kit-main.tar.gz HEAD
          sha256sum verification-evidence/wcbs-build-kit.bundle verification-evidence/wcbs-build-kit-main.tar.gz | tee verification-evidence/logs/checksums.txt

      - name: Upload verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: wcbs-verification-bridge-${{ github.sha }}
          path: verification-evidence/
          if-no-files-found: error
          retention-days: 7
