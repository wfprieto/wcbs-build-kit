name: WCBS Verification Bridge Cleanup

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/wcbs-verification-bridge.yml'

permissions:
  contents: write

jobs:
  remove-temporary-verification-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Verify final evidence and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat .wcbs-verification/verified-head.txt)" = "b2f3c0c2272f2ecca33632b4f424401b0c24193d"
          grep -q 'F-011 hermetic checks: PASS' .wcbs-verification/logs/f011-summary.txt
          grep -q 'F-012 adversarial checks: PASS (10 cases)' .wcbs-verification/logs/f012-adversarial.txt
          git rm -rf .wcbs-verification .github/workflows/wcbs-verification-bridge.yml
          git diff --cached --check
          git config user.name 'WCBS Verification Bridge'
          git config user.email 'actions@users.noreply.github.com'
          git commit -m 'Remove temporary WCBS verification bridge and evidence'
          git push origin HEAD:main
