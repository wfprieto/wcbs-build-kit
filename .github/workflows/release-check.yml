name: Release Check

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    name: Release Gate Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify kit
        run: npm run verify

      - name: Run system tests
        run: npm run system-test

      - name: Run install and adapter smoke checks
        run: npm run check-install

      - name: Build release artifacts
        run: npm run build:release-artifacts

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: super-build-kit-release-artifacts
          path: dist/release-artifacts/
