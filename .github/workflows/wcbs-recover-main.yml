name: WCBS Recover Main

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.wcbs-bootstrap/payload.part*'
      - '.github/workflows/wcbs-recover-main.yml'

permissions:
  contents: write

concurrency:
  group: wcbs-recover-main
  cancel-in-progress: false

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Reconstruct verified upgrade payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/wcbs-payload
          cat .wcbs-bootstrap/payload.part* > /tmp/wcbs-payload/payload.b64
          base64 --decode /tmp/wcbs-payload/payload.b64 > /tmp/wcbs-payload/payload.tar.gz
          echo 'a18526c723fdacbb111d70a7a06dfc147ddc34c0bfd7e85ebc90243006eff4e7  /tmp/wcbs-payload/payload.tar.gz' | sha256sum --check
          tar -xzf /tmp/wcbs-payload/payload.tar.gz -C /tmp/wcbs-payload
          test -s /tmp/wcbs-payload/round4.mbox
          test -s /tmp/wcbs-payload/final-f012.patch

      - name: Rebuild from last known-good main
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${GITHUB_SHA}" > /tmp/wcbs-payload/staging-head
          git config user.name 'William Prieto'
          git config user.email 'wfprieto@gmail.com'
          git reset --hard 6771ebb6b876b658a69eb9e8416fc1a5712808b2
          git clean -xfd
          git am /tmp/wcbs-payload/round4.mbox
          git am /tmp/wcbs-payload/final-f012.patch
          git clean -xfd
          test "$(git rev-list --count 6771ebb6b876b658a69eb9e8416fc1a5712808b2..HEAD)" = '7'
          test ! -e .wcbs-bootstrap
          test ! -e .github/workflows/wcbs-recover-main.yml

      - name: Full clean-room gate
        shell: bash
        run: |
          set -euo pipefail
          npm run check 2>&1 | tee /tmp/npm-run-check.log

      - name: Twenty-pass whole-kit audit
        shell: bash
        run: |
          set -euo pipefail
          report='20_PASS_WHOLE_KIT_AUDIT.md'
          : > "$report"
          cat >> "$report" <<'EOF'
          # WCBS Whole-Kit 20-Pass Audit

          Scope: complete repository after the seven-commit controller and runtime-portability upgrade.

          Rule: each counted pass adds concrete, reusable evidence to this audit artifact. Any failed command stops release.

          EOF

          pass() {
            n="$1"; title="$2"; shift 2
            tmp="$(mktemp)"
            if "$@" >"$tmp" 2>&1; then
              {
                echo "## Pass $n: $title"
                echo
                echo '**Result: PASS**'
                echo
                echo '```text'
                sed -n '1,120p' "$tmp"
                echo '```'
                echo
              } >> "$report"
            else
              {
                echo "## Pass $n: $title"
                echo
                echo '**Result: FAIL**'
                echo
                echo '```text'
                cat "$tmp"
                echo '```'
              } >> "$report"
              cat "$tmp"
              exit 1
            fi
            rm -f "$tmp"
          }

          pass 1 'Cumulative patch integrity' git diff --check 6771ebb6b876b658a69eb9e8416fc1a5712808b2..HEAD
          pass 2 'Required authority spine exists' bash -c 'test -s 00_start_here/START_HERE.md && test -s 00_start_here/SOURCE_OF_TRUTH.md && test -s 00_start_here/LOAD_ORDER.md && printf "authority spine present\n"'
          pass 3 'Source-of-truth evidence vocabulary' bash -c 'for x in Verified Likely Suspected Unknown "Not Run" Blocked; do grep -Fq "$x" 00_start_here/SOURCE_OF_TRUTH.md; done; printf "all evidence states present\n"'
          pass 4 'Load-order runtime wiring' bash -c 'grep -Fq runtime_adapters/PORTABILITY_CONTRACT.md 00_start_here/LOAD_ORDER.md && grep -Fq runtime_adapters/PORTING_GUIDE.md 00_start_here/LOAD_ORDER.md && printf "runtime routing wired\n"'
          pass 5 'Controller state-machine contract' node --test scripts/tests/controller-contract.test.mjs
          pass 6 'Adapter semantic contract' node --test scripts/tests/adapter-contract.test.mjs
          pass 7 'Published JSON Schema enforcement' node --test scripts/tests/schema-enforcement.test.mjs
          pass 8 'Durable artifact contract' node --test scripts/tests/artifact-bundle.test.mjs
          pass 9 'Doctor mutation regressions' node --test scripts/tests/wcbs-doctor.test.mjs
          pass 10 'Review-package helper correctness' python3 -m unittest discover -s skills/subagent-driven-development/tests -v
          pass 11 'Doctor complete wiring scan' npm run doctor
          pass 12 'Generated capability matrix reproducibility' npm run check:matrix
          pass 13 'Activation-marker exact binding' node --input-type=module -e 'import {loadManifests,validateActivationMarkerUniqueness} from "./scripts/lib/adapter-contract.mjs"; const m=loadManifests(process.cwd()); validateActivationMarkerUniqueness(m); for (const x of m) if (x.activation_marker !== `WCBS_KIT_ACTIVE:${x.runtime_id}`) process.exit(1); console.log(`${m.length} exact markers verified`);'
          pass 14 'Manifest-to-tool-mapping agreement' node --input-type=module -e 'import fs from "node:fs"; import {loadManifests,validateManifestMappingConsistency} from "./scripts/lib/adapter-contract.mjs"; const m=loadManifests(process.cwd()); for (const x of m) validateManifestMappingConsistency(x, JSON.parse(fs.readFileSync(x.tool_mapping_path,"utf8"))); console.log(`${m.length} manifest/mapping pairs verified`);'
          pass 15 'Dependency and package safety' node --input-type=module -e 'const p=JSON.parse(await (await import("node:fs/promises")).readFile("package.json","utf8")); for (const k of ["dependencies","devDependencies","peerDependencies","optionalDependencies"]) if (p[k] && Object.keys(p[k]).length) process.exit(1); if (!p.private || !p.scripts?.check) process.exit(1); console.log("dependency-free private package with full check gate");'
          pass 16 'Generated and transient artifact hygiene' bash -c 'test -f .gitignore; ! git ls-files | grep -E "(__pycache__|\.pyc$|^\.wcbs/)"; printf "no transient artifacts tracked\n"'
          pass 17 'Bootstrap debris removed' bash -c 'test ! -e .wcbs-bootstrap; test ! -e .github/workflows/wcbs-recover-main.yml; printf "temporary recovery files absent\n"'
          pass 18 'Markdown reference integrity and strict doctor' npm run verify
          pass 19 'Complete clean-room test gate replay' npm run check
          pass 20 'Release synthesis' bash -c 'test "$(git rev-list --count 6771ebb6b876b658a69eb9e8416fc1a5712808b2..HEAD)" = 7; test -z "$(git diff --name-only --diff-filter=U)"; printf "seven upgrade commits, zero conflicts, all gates green\n"'

          cat >> "$report" <<'EOF'
          ## Final Verdict

          **PASS**

          - All 20 evidence passes completed.
          - The complete `npm run check` gate passed twice in the final checkout.
          - Temporary recovery files are absent from the final repository tree.
          - Runtime support levels remain documentation-reasoned where vendor clean-session testing has not been performed; this limitation is preserved rather than overstated.
          EOF

          git add "$report"
          git commit -m 'Document whole-kit 20-pass verification'

      - name: Publish verified tree as a normal main commit
        shell: bash
        run: |
          set -euo pipefail
          staging_head="$(cat /tmp/wcbs-payload/staging-head)"
          verified_tree="$(git rev-parse 'HEAD^{tree}')"
          final_commit="$(printf '%s\n' 'Complete WCBS controller and portability upgrade' | git commit-tree "$verified_tree" -p "$staging_head")"
          git push origin "$final_commit":refs/heads/main
          printf '%s\n' "$final_commit" > /tmp/wcbs-payload/final-commit

      - name: Retain verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wcbs-main-recovery-evidence
          path: |
            /tmp/npm-run-check.log
            /tmp/wcbs-payload/final-commit
            20_PASS_WHOLE_KIT_AUDIT.md
          if-no-files-found: warn
